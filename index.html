<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="normal-mode">

    <div class="particles" id="particles"></div>

    <div class="app-container">
        <div class="header">
            <h1>Apex Optimizer</h1>
            
            <div class="mode-section">
                <label class="radio-option" id="normalOption">
                    <input type="radio" name="modeSelect" value="normal" id="modeNormal" checked>
                    <span class="radio-mark"></span>
                    <span class="radio-label">Normal Mode</span>
                </label>

                <label class="radio-option" id="gamingOption">
                    <input type="radio" name="modeSelect" value="gaming" id="modeGaming">
                    <span class="radio-mark"></span>
                    <span class="radio-label">Gaming Mode</span>
                </label>
            </div>
        </div>

        <div class="main-content">
            <!-- Left Side - Hardware Monitoring -->
            <div class="left-section">
                <h3 class="section-title">Hardware Monitoring</h3>
                <div class="hardware-grid">
                    <div class="hardware-item">
                        <div class="circular-progress" data-progress="0">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="progress-ring-circle-bg" cx="40" cy="40" r="32"></circle>
                                <circle class="progress-ring-circle" cx="40" cy="40" r="32"></circle>
                            </svg>
                            <div class="progress-text">
                                <span class="percentage" id="cpuPercent">0%</span>
                                <span class="label">CPU</span>
                            </div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="circular-progress" data-progress="0">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="progress-ring-circle-bg" cx="40" cy="40" r="32"></circle>
                                <circle class="progress-ring-circle" cx="40" cy="40" r="32"></circle>
                            </svg>
                            <div class="progress-text">
                                <span class="percentage" id="ramPercent">0%</span>
                                <span class="label">RAM</span>
                            </div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="circular-progress" data-progress="0">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="progress-ring-circle-bg" cx="40" cy="40" r="32"></circle>
                                <circle class="progress-ring-circle" cx="40" cy="40" r="32"></circle>
                            </svg>
                            <div class="progress-text">
                                <span class="percentage" id="gpuPercent">0%</span>
                                <span class="label">GPU</span>
                            </div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="circular-progress" data-progress="0">
                            <svg class="progress-ring" width="80" height="80">
                                <circle class="progress-ring-circle-bg" cx="40" cy="40" r="32"></circle>
                                <circle class="progress-ring-circle" cx="40" cy="40" r="32"></circle>
                            </svg>
                            <div class="progress-text">
                                <span class="percentage" id="diskPercent">0%</span>
                                <span class="label">DISK</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Optimization Section -->
            <div class="right-section">
                <h3 class="section-title">System Optimization</h3>
                
                <div class="status-card">
                    <h2 id="modeTitle">Normal Mode Active</h2>
                    <p id="modeDescription">
                        Balanced system optimization for everyday usage.
                    </p>

                    <div class="optimization-status" id="optimizationStatus"></div>

                    <div class="btn-group">
                        <button class="optimize-btn" id="optimizeBtn">
                            <span class="btn-text">Optimize Now</span>
                            <span class="btn-loader"></span>
                        </button>
                        <button class="reset-btn" id="resetBtn">
                            <span class="reset-icon">↺</span> Reset
                        </button>
                    </div>
                </div>

                <div class="stats-footer">
                    <div class="stat-item">
                        <span class="stat-label">Processes Optimized</span>
                        <span class="stat-value" id="processCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Memory Freed</span>
                        <span class="stat-value" id="memoryFreed">0 MB</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
